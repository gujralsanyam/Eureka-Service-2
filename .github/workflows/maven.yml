name: Java CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Java Version
        run: java -version

      - name: Verify Maven Version
        run: mvn -version

      - name: Clean Project
        run: mvn clean

      - name: Build Project
        run: mvn install -DskipTests

      - name: Generate Dependency Tree
        run: mvn dependency:tree